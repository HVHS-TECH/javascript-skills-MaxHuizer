<!DOCTYPE html>
<html lang="en">

<head>
  <title>T14-arrays 1</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->

<body>
  <h1>T14-arrays part 1</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  <form onsubmit="return false;">
  <input type="text" id="nameField" userName="formName"  placeholder="Name">
  <input type="submit" onClick=getFormInput()>
  </form>

  <form onsubmit="return false;">
  <input type="text" id="ageField"  placeholder="Age" age="formAge">
  <input type="submit" onClick=getFormInput()>
  </form>

  <form onsubmit="return false;">
  <input type="text" id="moneyField" age="formMoney"  placeholder="Pocket Money">
  <input type="submit" onClick=getFormInput()>
  </form>

  <p>On a scale of 1-4 how much do you like Chocolate?</p>

  <form onsubmit="return false;">
  <input type="text" id="choiceField" age="formChocolate"  placeholder="1-4">
  <input type="submit" onClick=getFormInput()>
  </form>

  <div id="spaceForJavaScriptOutput">

    The output of your script will go here.

  </div>


  <script src="../t14_arrays_1.js"></script>

</body>

</html>
